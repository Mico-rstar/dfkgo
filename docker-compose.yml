services:
  mysql:
    image: ghcr.io/linuxserver/mariadb:10.11.6
    platform: linux/arm64
    container_name: dfkgo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dfkgo123}
      MYSQL_DATABASE: dfkgo
      MYSQL_USER: dfkgo
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dfkgo123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 15

  dfkgo:
    image: ${DFKGO_IMAGE:-ghcr.io/mico-rstar/dfkgo:latest}
    container_name: dfkgo
    restart: unless-stopped
    ports:
      - "8888:8888"
    env_file:
      - app.env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
